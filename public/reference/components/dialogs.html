<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0">
  <script type="module" src="/dist/main.js"></script>
  <html-include src="/_includes/head.html"></html-include>
  <title>Dialogs – Components Reference – Live Wires</title>
</head>
<body>
  <html-include src="/_includes/header.html"></html-include>
  <main id="main">
    <article class="section prose">
      <h1>Dialogs</h1>
<!-- Native dialog -->
<dialog class="dialog imposter-contain">
  <div class="box stack">
    <header class="cluster cluster-between cluster-nowrap">
      <h2>Dialog Title</h2>
      <button class="dialog-close" type="button" aria-label="Close">&times;</button>
    </header>
    <p>Dialog content goes here.</p>
    <footer class="cluster cluster-end pt-1 mt-05 border-t">
      <button class="button">Cancel</button>
      <button class="button button--accent">Confirm</button>
    </footer>
  </div>
</dialog>

<!-- Popup dialog (Web Component) — confirmation -->
<popup-dialog title="Confirm?" body="Are you sure?" confirm-label="Yes" cancel-label="No">
  <button class="button">Click me</button>
</popup-dialog>

<!-- Popup dialog — info panel (no footer) -->
<popup-dialog title="Note" body="Source citation.">
  <sup style="text-decoration: underline dotted; cursor: pointer;">1</sup>
</popup-dialog>

<!-- Popup dialog — custom actions -->
<popup-dialog title="About">
  <button class="button">Learn more</button>
  <div slot="body"><p>Custom HTML content.</p></div>
  <div slot="actions"><button data-action="close" class="button">Got it</button></div>
</popup-dialog>
    </article>
  </main>
  <html-include src="/_includes/footer.html"></html-include>
</body>
</html>
