<!-- With semantic marker colors -->
<ol class="timeline">
  <li class="timeline__item timeline__item--success">
    <time class="timeline__date">Completed</time>
    <div class="timeline__content">
      <h3>Task finished</h3>
    </div>
  </li>
  <li class="timeline__item timeline__item--warning">
    <time class="timeline__date">In progress</time>
    <div class="timeline__content">

    </div>

  <li class="timeline__item timeline__item--error">

    </div>
  </li>
</ol>
