<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0">
  <script type="module" src="/dist/main.js"></script>
  <html-include src="/_includes/head.html"></html-include>
  <title>Switches – Components Reference – Live Wires</title>
</head>
<body>
  <html-include src="/_includes/header.html"></html-include>
  <main id="main">
    <article class="section prose stack">
      <h1>Switches</h1>

      <!-- Default switch -->
      <label class="switch">
        <input type="checkbox" role="switch">
        <span></span>
        Default
      </label>

      <!-- Checked switch -->
      <label class="switch">
        <input type="checkbox" role="switch" checked>
        <span></span>
        Checked
      </label>

      <!-- Small variant -->
      <label class="switch switch--small">
        <input type="checkbox" role="switch">
        <span></span>
        Small
      </label>

      <!-- Disabled switch -->
      <label class="switch">
        <input type="checkbox" role="switch" disabled>
        <span></span>
        Disabled
      </label>
    </article>
  </main>
  <html-include src="/_includes/footer.html"></html-include>
</body>
</html>
