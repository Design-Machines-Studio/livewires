<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0">
  <script type="module" src="/dist/main.js"></script>
  <html-include src="/_includes/head.html"></html-include>
  <title>Tables – Components Reference – Live Wires</title>
</head>
<body>
  <html-include src="/_includes/header.html"></html-include>
  <main id="main">
    <article class="section prose">
      <h1>Tables</h1>
<!-- Default table (semantic HTML, no classes needed) -->
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Role</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Jane Doe</td>
      <td>Admin</td>
      <td>Active</td>
    </tr>
    <tr>
      <td>John Smith</td>
      <td>Editor</td>
      <td>Pending</td>
    </tr>
  </tbody>
</table>

<!-- Bordered table -->
<table class="table--bordered">
  <thead>
    <tr><th>Item</th><th>Price</th></tr>
  </thead>
  <tbody>
    <tr><td>Widget</td><td>$9.99</td></tr>
    <tr><td>Gadget</td><td>$19.99</td></tr>
  </tbody>
</table>

<!-- Striped table -->
<table class="table--striped">
  <thead>
    <tr><th>Date</th><th>Event</th></tr>
  </thead>
  <tbody>
    <tr><td>Jan 1</td><td>New Year</td></tr>
    <tr><td>Feb 14</td><td>Valentine's</td></tr>
    <tr><td>Mar 17</td><td>St. Patrick's</td></tr>
  </tbody>
</table>

<!-- Lined table -->
<table class="table--lined">
  <thead>
    <tr><th>Feature</th><th>Status</th></tr>
  </thead>
  <tbody>
    <tr><td>Dark mode</td><td>Complete</td></tr>
    <tr><td>Exports</td><td>In progress</td></tr>
  </tbody>
</table>
    </article>
  </main>
  <html-include src="/_includes/footer.html"></html-include>
</body>
</html>
