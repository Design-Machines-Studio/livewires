<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0">
  <script type="module" src="/dist/main.js"></script>
  <html-include src="/_includes/head.html"></html-include>
  <title>Avatars – Components Reference – Live Wires</title>
</head>
<body>
  <html-include src="/_includes/header.html"></html-include>
  <main id="main">
    <article class="section prose">
      <h1>Avatars</h1>
<!-- Default (round) -->
<span class="avatar">
  <img src="/img/placeholder.jpg" alt="Jane Doe">
</span>

<!-- Small -->
<span class="avatar avatar--small">
  <img src="/img/placeholder.jpg" alt="Jane Doe">
</span>

<!-- Large -->
<span class="avatar avatar--large">
  <img src="/img/placeholder.jpg" alt="Jane Doe">
</span>

<!-- Extra large -->
<span class="avatar avatar--xlarge">
  <img src="/img/placeholder.jpg" alt="Jane Doe">
</span>

<!-- Square -->
<span class="avatar avatar--square">
  <img src="/img/placeholder.jpg" alt="Jane Doe">
</span>

<!-- Initials fallback (no image) -->
<span class="avatar" aria-label="Jane Doe">
  <span class="initials" aria-hidden="true">JD</span>
</span>

<!-- Initials, small -->
<span class="avatar avatar--small" aria-label="Jane Doe">
  <span class="initials" aria-hidden="true">JD</span>
</span>

<!-- Avatar group (overlapping) -->
<div class="avatar-group">
  <span class="avatar"><img src="/img/placeholder.jpg" alt="User 1"></span>
  <span class="avatar"><img src="/img/placeholder.jpg" alt="User 2"></span>
  <span class="avatar"><img src="/img/placeholder.jpg" alt="User 3"></span>
</div>
    </article>
  </main>
  <html-include src="/_includes/footer.html"></html-include>
</body>
</html>
