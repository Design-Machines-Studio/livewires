<!-- Default (round) -->
<span class="avatar">
  <img src="/img/placeholder.jpg" alt="Jane Doe">
</span>

<!-- Small -->
<span class="avatar avatar--small">
  <img src="/img/placeholder.jpg" alt="Jane Doe">
</span>

<!-- Large -->
<span class="avatar avatar--large">
  <img src="/img/placeholder.jpg" alt="Jane Doe">
</span>

<!-- Extra large -->
<span class="avatar avatar--xlarge">
  <img src="/img/placeholder.jpg" alt="Jane Doe">
</span>

<!-- Square -->
<span class="avatar avatar--square">
  <img src="/img/placeholder.jpg" alt="Jane Doe">
</span>

<!-- Avatar group (overlapping) -->
<div class="avatar-group">
  <span class="avatar"><img src="/img/placeholder.jpg" alt="User 1"></span>
  <span class="avatar"><img src="/img/placeholder.jpg" alt="User 2"></span>
  <span class="avatar"><img src="/img/placeholder.jpg" alt="User 3"></span>
</div>
