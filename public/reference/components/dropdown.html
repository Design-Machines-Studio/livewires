<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0">
  <script type="module" src="/dist/main.js"></script>
  <html-include src="/_includes/head.html"></html-include>
  <title>Dropdown – Components Reference – Live Wires</title>
</head>
<body>
  <html-include src="/_includes/header.html"></html-include>
  <main id="main">
    <article class="section prose">
      <h1>Dropdown</h1>
<!-- Basic dropdown -->
<div class="dropdown">
  <button class="button trigger">Menu</button>
  <ul class="menu">
    <li><a href="#">Action 1</a></li>
    <li><a href="#">Action 2</a></li>
    <li><hr></li>
    <li><button>Delete</button></li>
  </ul>
</div>

<!-- End-aligned dropdown -->
<div class="dropdown dropdown--end">
  <button class="button trigger">Options</button>
  <ul class="menu">
    <li><a href="#">Edit</a></li>
    <li><a href="#">Duplicate</a></li>
  </ul>
</div>

<!-- Upward dropdown -->
<div class="dropdown dropdown--up">
  <button class="button trigger">Actions</button>
  <ul class="menu">
    <li><a href="#">View</a></li>
    <li><a href="#">Export</a></li>
  </ul>
</div>

<!-- With disabled item -->
<div class="dropdown">
  <button class="button trigger">More</button>
  <ul class="menu">
    <li><a href="#">Available</a></li>
    <li><a href="#" disabled>Unavailable</a></li>
  </ul>
</div>
    </article>
  </main>
  <html-include src="/_includes/footer.html"></html-include>
</body>
</html>
