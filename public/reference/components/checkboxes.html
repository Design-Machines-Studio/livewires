<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0">
  <script type="module" src="/dist/main.js"></script>
  <html-include src="/_includes/head.html"></html-include>
  <title>Checkboxes - Components Reference - Live Wires</title>
</head>
<body>
  <html-include src="/_includes/header.html"></html-include>
  <main id="main">
    <article class="section prose">
      <h1>Checkboxes</h1>
<!-- Checkbox -->
<label class="checkbox">
  <input type="checkbox" name="option" value="1">
  Default checkbox
</label>

<!-- Radio -->
<label class="radio">
  <input type="radio" name="choice" value="a">
  Radio option
</label>

<!-- Large variant -->
<label class="checkbox checkbox--large">
  <input type="checkbox" name="large" value="1">
  Large checkbox
</label>

<!-- Icon-only checkbox (for tables) -->
<label class="checkbox checkbox--icon">
  <input type="checkbox" name="select" value="1">
  Select row
</label>

<!-- Color variants -->
<label class="checkbox checkbox--success">
  <input type="checkbox" name="ok" value="1">
  Success
</label>

<label class="checkbox checkbox--warning">
  <input type="checkbox" name="warn" value="1">
  Warning
</label>

<label class="checkbox checkbox--error">
  <input type="checkbox" name="danger" value="1">
  Danger
</label>

<!-- Disabled -->
<label class="checkbox">
  <input type="checkbox" name="disabled" value="1" disabled>
  Disabled option
</label>

<!-- Checkbox list -->
<ul class="check-list">
  <li>
    <label class="checkbox">
      <input type="checkbox" name="items" value="a">
      Item A
    </label>
  </li>
  <li>
    <label class="checkbox">
      <input type="checkbox" name="items" value="b">
      Item B
    </label>
  </li>
</ul>

<!-- Inline checkbox list -->
<ul class="check-list check-list--inline">
  <li>
    <label class="checkbox">
      <input type="checkbox" name="inline" value="x">
      Option X
    </label>
  </li>
  <li>
    <label class="checkbox">
      <input type="checkbox" name="inline" value="y">
      Option Y
    </label>
  </li>
</ul>

<!-- Radio color variants -->
<label class="radio radio--success">
  <input type="radio" name="radio-color" value="ok">
  Success
</label>

<label class="radio radio--warning">
  <input type="radio" name="radio-color" value="warn">
  Warning
</label>

<label class="radio radio--error">
  <input type="radio" name="radio-color" value="danger">
  Danger
</label>

<!-- Radio group (fieldset + legend required for grouped radio inputs) -->
<fieldset class="border-none p-0 m-0">
  <legend>Preferred option</legend>
  <ul class="check-list">
    <li>
      <label class="radio">
        <input type="radio" name="group" value="1">
        First choice
      </label>
    </li>
    <li>
      <label class="radio">
        <input type="radio" name="group" value="2">
        Second choice
      </label>
    </li>
  </ul>
</fieldset>
    </article>
  </main>
  <html-include src="/_includes/footer.html"></html-include>
</body>
</html>
