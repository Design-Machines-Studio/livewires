<!-- Checkbox -->
<label class="checkbox">
  <input type="checkbox" name="option" value="1">
  Default checkbox
</label>

<!-- Radio -->
<label class="radio">
  <input type="radio" name="choice" value="a">
  Radio option
</label>

<!-- Small variant -->
<label class="checkbox checkbox--small">
  <input type="checkbox" name="small" value="1">
  Small checkbox
</label>

<!-- Icon-only checkbox (for tables) -->
<label class="checkbox checkbox--icon">
  <input type="checkbox" name="select" value="1">
  Select row
</label>

<!-- Color variants -->
<label class="checkbox checkbox--ok">
  <input type="checkbox" name="ok" value="1">
  Success
</label>

<label class="checkbox checkbox--warning">
  <input type="checkbox" name="warn" value="1">
  Warning
</label>

<label class="checkbox checkbox--danger">
  <input type="checkbox" name="danger" value="1">
  Danger
</label>

<!-- Disabled -->
<label class="checkbox">
  <input type="checkbox" name="disabled" value="1" disabled>
  Disabled option
</label>

<!-- Checkbox list -->
<ul class="check-list">
  <li>
    <label class="checkbox">
      <input type="checkbox" name="items" value="a">
      Item A
    </label>
  </li>
  <li>
    <label class="checkbox">
      <input type="checkbox" name="items" value="b">
      Item B
    </label>
  </li>
</ul>

<!-- Inline checkbox list -->
<ul class="check-list check-list--inline">
  <li>
    <label class="checkbox">
      <input type="checkbox" name="inline" value="x">
      Option X
    </label>
  </li>
  <li>
    <label class="checkbox">
      <input type="checkbox" name="inline" value="y">
      Option Y
    </label>
  </li>
</ul>

<!-- Radio group -->
<ul class="check-list">
  <li>
    <label class="radio">
      <input type="radio" name="group" value="1">
      First choice
    </label>
  </li>
  <li>
    <label class="radio">
      <input type="radio" name="group" value="2">
      Second choice
    </label>
  </li>
</ul>
