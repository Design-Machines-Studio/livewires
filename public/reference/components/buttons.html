<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0">
  <script type="module" src="/dist/main.js"></script>
  <html-include src="/_includes/head.html"></html-include>
  <title>Buttons – Components Reference – Live Wires</title>
</head>
<body>
  <html-include src="/_includes/header.html"></html-include>
  <main id="main">
    <article class="section prose">
      <h1>Buttons</h1>
<!-- Base button -->
<button class="button">Label</button>

<!-- Color variants -->
<button class="button button--accent">Accent</button>

<!-- Size variants -->
<button class="button button--small">Small</button>
<button class="button button--large">Large</button>

<!-- Link styled as button -->
<a href="#" class="button button--accent">Link Button</a>

<!-- Submit button -->
<button type="submit" class="button button--accent">Submit</button>

<!-- Disabled -->
<button class="button" disabled>Disabled</button>

<!-- Button group -->
<div class="button-group">
  <button class="button">Left</button>
  <button class="button">Center</button>
  <button class="button">Right</button>
</div>
    </article>
  </main>
  <html-include src="/_includes/footer.html"></html-include>
</body>
</html>
