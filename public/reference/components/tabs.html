<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0">
  <script type="module" src="/dist/main.js"></script>
  <html-include src="/_includes/head.html"></html-include>
  <title>Tabs – Components Reference – Live Wires</title>
</head>
<body>
  <html-include src="/_includes/header.html"></html-include>
  <main id="main">
    <article class="section prose">
      <h1>Tabs</h1>
<!-- Standard tabs -->
<div class="tabs">
  <div class="list" role="tablist" aria-label="Content tabs">
    <button class="tab" role="tab" aria-selected="true" aria-controls="panel-1" id="tab-1">Tab 1</button>
    <button class="tab" role="tab" aria-selected="false" aria-controls="panel-2" id="tab-2">Tab 2</button>
    <button class="tab" role="tab" aria-selected="false" aria-controls="panel-3" id="tab-3">Tab 3</button>
  </div>
  <div class="panel" role="tabpanel" id="panel-1" aria-labelledby="tab-1">
    <p>Content for tab 1.</p>
  </div>
  <div class="panel" role="tabpanel" id="panel-2" aria-labelledby="tab-2" hidden>
    <p>Content for tab 2.</p>
  </div>
  <div class="panel" role="tabpanel" id="panel-3" aria-labelledby="tab-3" hidden>
    <p>Content for tab 3.</p>
  </div>
</div>

<!-- Pills variant -->
<div class="tabs tabs--pills">
  <div class="list" role="tablist" aria-label="Filter tabs">
    <button class="tab" role="tab" aria-selected="true">All</button>
    <button class="tab" role="tab" aria-selected="false">Active</button>
    <button class="tab" role="tab" aria-selected="false">Archived</button>
  </div>
</div>

<!-- Link-based tabs (use aria-current) -->
<div class="tabs">
  <nav class="list">
    <a class="tab" href="#section-1" aria-current="page">Overview</a>
    <a class="tab" href="#section-2">Details</a>
    <a class="tab" href="#section-3">History</a>
  </nav>
</div>
    </article>
  </main>
  <html-include src="/_includes/footer.html"></html-include>
</body>
</html>
