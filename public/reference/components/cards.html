<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0">
  <script type="module" src="/dist/main.js"></script>
  <html-include src="/_includes/head.html"></html-include>
  <title>Cards – Components Reference – Live Wires</title>
</head>
<body>
  <html-include src="/_includes/header.html"></html-include>
  <main id="main">
    <article class="section prose">
      <h1>Cards</h1>
<!-- Stat card -->
<div class="card box stack">
  <p class="title">Revenue</p>
  <p class="value">$12,450</p>
  <p class="description">+12% from last month</p>
</div>

<!-- Card with header -->
<div class="card">
  <div class="header box">
    <h3>Panel Title</h3>
  </div>
  <div class="box stack">
    <p>Card body content.</p>
  </div>
</div>

<!-- Subtle card -->
<div class="card card--subtle box stack">
  <p class="title">Users</p>
  <p class="value">1,234</p>
</div>

<!-- Borderless card -->
<div class="card card--borderless box stack">
  <p>Borderless card content.</p>
</div>

<!-- Clickable card -->
<a href="#" class="card box stack">
  <p class="title">Click me</p>
  <p class="description">This card is a link.</p>
</a>

<!-- Activity card list -->
<div class="stack">
  <div class="activity-card">
    <p>First activity item.</p>
  </div>
  <div class="activity-card">
    <p>Second activity item.</p>
  </div>
  <div class="activity-card">
    <p>Third activity item.</p>
  </div>
</div>
    </article>
  </main>
  <html-include src="/_includes/footer.html"></html-include>
</body>
</html>
