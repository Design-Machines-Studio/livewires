<!-- Default toast -->
<div class="toast">
  <p class="toast-content">Something happened.</p>
  <button class="toast-close" aria-label="Dismiss">&times;</button>
</div>

<!-- Success -->
<div class="toast toast--success">
  <p class="toast-content">Changes saved successfully.</p>
  <button class="toast-close" aria-label="Dismiss">&times;</button>
</div>

<!-- Error -->
<div class="toast toast--error">
  <p class="toast-content">Something went wrong.</p>
  <button class="toast-close" aria-label="Dismiss">&times;</button>
</div>

<!-- Warning -->
<div class="toast toast--warning">
  <p class="toast-content">Please review before continuing.</p>
  <button class="toast-close" aria-label="Dismiss">&times;</button>
</div>

<!-- Info -->
<div class="toast toast--info">
  <p class="toast-content">New version available.</p>
  <button class="toast-close" aria-label="Dismiss">&times;</button>
</div>

<!-- Toast container (fixed position) -->
<div class="toast-container">
  <div class="toast toast--success">
    <p class="toast-content">Stacked toast 1.</p>
    <button class="toast-close" aria-label="Dismiss">&times;</button>
  </div>
  <div class="toast toast--info">
    <p class="toast-content">Stacked toast 2.</p>
    <button class="toast-close" aria-label="Dismiss">&times;</button>
  </div>
</div>
