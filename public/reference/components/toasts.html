<!-- Default toast -->
<div class="toast">
  <p class="content">Something happened.</p>
  <button class="close" aria-label="Dismiss">&times;</button>
</div>

<!-- Success -->
<div class="toast toast--success">
  <p class="content">Changes saved successfully.</p>
  <button class="close" aria-label="Dismiss">&times;</button>
</div>

<!-- Error -->
<div class="toast toast--error">
  <p class="content">Something went wrong.</p>
  <button class="close" aria-label="Dismiss">&times;</button>
</div>

<!-- Warning -->
<div class="toast toast--warning">
  <p class="content">Please review before continuing.</p>
  <button class="close" aria-label="Dismiss">&times;</button>
</div>

<!-- Info -->
<div class="toast toast--info">
  <p class="content">New version available.</p>
  <button class="close" aria-label="Dismiss">&times;</button>
</div>

<!-- Stacked toasts (use imposter-fixed layout primitive) -->
<div class="imposter-fixed stack stack-compact" style="inset-block-start: var(--line-1); inset-inline-end: var(--line-1);">
  <div class="toast toast--success">
    <p class="content">Stacked toast 1.</p>
    <button class="close" aria-label="Dismiss">&times;</button>
  </div>
  <div class="toast toast--info">
    <p class="content">Stacked toast 2.</p>
    <button class="close" aria-label="Dismiss">&times;</button>
  </div>
</div>
