<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0">
  <script type="module" src="/dist/main.js"></script>
  <html-include src="/_includes/head.html"></html-include>
  <title>Imposter – Layouts Reference – Live Wires</title>
</head>
<body>
  <html-include src="/_includes/header.html"></html-include>
  <main id="main">
    <article class="section prose">
      <h1>Imposter</h1>
<!-- Centered over positioned parent -->
<div style="position: relative; height: 200px;">
  <div class="imposter">
    <p>Centered overlay</p>
  </div>
</div>

<!-- Fixed to viewport -->
<div class="imposter-fixed">
  <p>Fixed overlay</p>
</div>

<!-- Constrained to viewport (for dialogs) -->
<dialog class="imposter-contain">
  <p>Constrained dialog content.</p>
</dialog>
    </article>
  </main>
  <html-include src="/_includes/footer.html"></html-include>
</body>
</html>
