<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0">
  <script type="module" src="/dist/main.js"></script>
  <html-include src="/_includes/head.html"></html-include>
  <title>Grid – Layouts Reference – Live Wires</title>
</head>
<body>
  <html-include src="/_includes/header.html"></html-include>
  <main id="main">
    <article class="section prose">
      <h1>Grid</h1>
<!-- Auto-fit grid -->
<div class="grid">
  <div>Item 1</div>
  <div>Item 2</div>
  <div>Item 3</div>
  <div>Item 4</div>
</div>

<!-- Narrow columns -->
<div class="grid grid-narrow">
  <div>Narrow 1</div>
  <div>Narrow 2</div>
  <div>Narrow 3</div>
</div>

<!-- Fixed 3-column -->
<div class="grid grid-columns-3">
  <div>Col 1</div>
  <div>Col 2</div>
  <div>Col 3</div>
</div>

<!-- Spanning columns -->
<div class="grid grid-columns-3">
  <div class="grid-span-2">Spans 2 columns</div>
  <div>Single column</div>
</div>

<!-- Container query span -->
<div class="grid grid-columns-3">
  <div class="grid-span-2@md">Spans 2 at medium+ container</div>
  <div>Single</div>
</div>
    </article>
  </main>
  <html-include src="/_includes/footer.html"></html-include>
</body>
</html>
