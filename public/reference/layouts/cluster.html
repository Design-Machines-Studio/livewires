<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0">
  <script type="module" src="/dist/main.js"></script>
  <html-include src="/_includes/head.html"></html-include>
  <title>Cluster – Layouts Reference – Live Wires</title>
</head>
<body>
  <html-include src="/_includes/header.html"></html-include>
  <main id="main">
    <article class="section prose">
      <h1>Cluster</h1>
<!-- Default cluster -->
<div class="cluster">
  <span>Tag one</span>
  <span>Tag two</span>
  <span>Tag three</span>
</div>

<!-- Centered -->
<div class="cluster cluster-center">
  <span>Centered A</span>
  <span>Centered B</span>
</div>

<!-- Space between -->
<div class="cluster cluster-between">
  <span>Left</span>
  <span>Right</span>
</div>

<!-- End aligned -->
<div class="cluster cluster-end">
  <button class="button">Cancel</button>
  <button class="button button--accent">Save</button>
</div>

<!-- No wrap -->
<nav class="cluster cluster-nowrap">
  <a href="#">Link 1</a>
  <a href="#">Link 2</a>
  <a href="#">Link 3</a>
</nav>
    </article>
  </main>
  <html-include src="/_includes/footer.html"></html-include>
</body>
</html>
