<!-- Text input -->
<label for="name">Name</label>
<input type="text" id="name" name="name" placeholder="Enter your name">

<!-- Email input -->
<label for="email">Email</label>
<input type="email" id="email" name="email" placeholder="you@example.com">

<!-- Password input -->
<label for="password">Password</label>
<input type="password" id="password" name="password">

<!-- Number input -->
<label for="quantity">Quantity</label>
<input type="number" id="quantity" name="quantity" min="0" max="100">

<!-- Date input -->
<label for="date">Date</label>
<input type="date" id="date" name="date">

<!-- Search input -->
<label for="search">Search</label>
<input type="search" id="search" name="search" placeholder="Search...">

<!-- Textarea -->
<label for="message">Message</label>
<textarea id="message" name="message" rows="4" placeholder="Write your message..."></textarea>

<!-- Select -->
<label for="country">Country</label>
<select id="country" name="country">
  <option value="">Choose one...</option>
  <option value="ca">Canada</option>
  <option value="us">United States</option>
  <option value="uk">United Kingdom</option>
</select>

<!-- Disabled input -->
<label for="disabled">Disabled</label>
<input type="text" id="disabled" name="disabled" value="Cannot edit" disabled>

<!-- Readonly input -->
<label for="readonly">Read only</label>
<input type="text" id="readonly" name="readonly" value="Read only" readonly>
