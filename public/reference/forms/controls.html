<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0">
  <script type="module" src="/dist/main.js"></script>
  <html-include src="/_includes/head.html"></html-include>
  <title>Controls – Forms Reference – Live Wires</title>
</head>
<body>
  <html-include src="/_includes/header.html"></html-include>
  <main id="main">
    <article class="section prose">
      <h1>Controls</h1>
<!-- Checkbox -->
<label class="checkbox">
  <input type="checkbox" name="agree" value="1">
  I agree to the terms
</label>

<!-- Radio group -->
<fieldset>
  <legend>Choose an option</legend>
  <ul class="check-list">
    <li>
      <label class="radio">
        <input type="radio" name="option" value="a">
        Option A
      </label>
    </li>
    <li>
      <label class="radio">
        <input type="radio" name="option" value="b">
        Option B
      </label>
    </li>
  </ul>
</fieldset>

<!-- Toggle switch -->
<div class="field switch">
  <input id="ctrl-off" name="toggle" type="radio" checked>
  <label for="ctrl-off" onclick="">Off</label>
  <input id="ctrl-on" name="toggle" type="radio">
  <label for="ctrl-on" onclick="">On</label>
  <span></span>
</div>

<!-- Inline checkboxes -->
<fieldset>
  <legend>Select all that apply</legend>
  <ul class="check-list check-list--inline">
    <li>
      <label class="checkbox">
        <input type="checkbox" name="tags" value="design">
        Design
      </label>
    </li>
    <li>
      <label class="checkbox">
        <input type="checkbox" name="tags" value="code">
        Code
      </label>
    </li>
    <li>
      <label class="checkbox">
        <input type="checkbox" name="tags" value="docs">
        Documentation
      </label>
    </li>
  </ul>
</fieldset>
    </article>
  </main>
  <html-include src="/_includes/footer.html"></html-include>
</body>
</html>
