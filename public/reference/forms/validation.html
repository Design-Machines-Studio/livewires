<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0">
  <script type="module" src="/dist/main.js"></script>
  <html-include src="/_includes/head.html"></html-include>
  <title>Validation – Forms Reference – Live Wires</title>
</head>
<body>
  <html-include src="/_includes/header.html"></html-include>
  <main id="main">
    <article class="section prose">
      <h1>Validation</h1>
<!-- Required field -->
<label for="required-field">Required field <span aria-hidden="true">*</span></label>
<input type="text" id="required-field" name="required" required aria-required="true">

<!-- Field with error -->
<label for="error-field">Email</label>
<input type="email" id="error-field" name="email" value="invalid" aria-invalid="true" aria-describedby="error-msg">
<p id="error-msg" role="alert">Please enter a valid email address.</p>

<!-- Checkbox validation variants -->
<label class="checkbox checkbox--ok">
  <input type="checkbox" name="ok" value="1" checked>
  Approved
</label>

<label class="checkbox checkbox--warning">
  <input type="checkbox" name="warn" value="1">
  Needs review
</label>

<label class="checkbox checkbox--danger">
  <input type="checkbox" name="danger" value="1">
  Rejected
</label>
    </article>
  </main>
  <html-include src="/_includes/footer.html"></html-include>
</body>
</html>
